services:
  market-horizon:
    build: .
    # No auth; intended for local/trusted-network use only. Do not expose this
    # port directly to the Internet — front it with an authenticating proxy.
    ports:
      - "8501:8501"
    environment:
      MARKET_HORIZON_APP_DATA_DIR: /data
      MARKET_HORIZON_DATABASE_PATH: /data/market_horizon.db
    volumes:
      - market-horizon-data:/data

volumes:
  market-horizon-data:

