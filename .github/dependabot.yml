version: 2

updates:
  # Python deps (pyproject.toml + uv.lock; Dependabot supports uv).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dependencies:
        patterns: ["*"]

  # GitHub Actions used by the workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Container base image.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
